        <main class="page-main">
        <form name="MeterCheck">
            <p class="header">Проверка ИПУ</p>
            <table class="input"><tr><td><label for="CurrentTransformerTransformationRatio" class="labelMeterCheck">Ктт = </label>
                <input id="CurrentTransformerTransformationRatio" type="number" class="inputMeterCheck" name="CurrentTransformerTransformationRatio" placeholder="1" required min="0" title="коэффициент трансформации трансформатора тока"/></td></tr></table>
            <table class="input"><tr><td><label for="PowerFactor" class="labelMeterCheck">cos(φ) = </label>
                <input id="PowerFactor" type="number" class="inputMeterCheck" name="PowerFactor" placeholder="1" required min="0" max="1" step="0.001" title="коэффициент мощности"/></td></tr></table>
            <table class="input"><tr><td><label><input type="checkbox" class="input" id="ThreePhaseMeterCheckBox"> 3-х фазный режим</label></td></tr></table>
            <p><table class="input"><tr><td><label id="FirstVoltageMeterLabel" for="VoltageMeterCheck" class="labelMeterCheck">U[В] = </label>
                <input id="VoltageMeterCheck" type="number" class="inputMeterCheck" name="VoltageMeterCheck" placeholder="220" value="220" required min="0" step="0.001" title="напряжение фазы А"/></td></tr></table>
                <table class="input"><tr><td><label id="FirstCurrentMeterLabel" for="CurrentMeterCheck" class="labelMeterCheck">I[А] = </label>
                    <input id="CurrentMeterCheck" type="number" class="inputMeterCheck" name="CurrentMeterCheck" placeholder="1" required min="0" step="0.001" title="ток фазы А"/></td></tr></table></p>
            <div id="ThreePhaseMeter" style="display: none">
                <p><table class="input"><tr><td><label for="VoltageMeterCheck_B" class="labelMeterCheck">Ub[В] = </label>
                    <input id="VoltageMeterCheck_B" type="number" class="inputMeterCheck" name="VoltageMeterCheck_B" placeholder="220" value="220" required min="0" title="напряжение фазы B"/></td></tr></table>
                    <table class="input"><tr><td><label for="CurrentMeterCheck_B" class="labelMeterCheck">Ib[А] = </label>
                        <input id="CurrentMeterCheck_B" type="number" class="inputMeterCheck" name="CurrentMeterCheck_B" placeholder="1" required min="0" title="ток фазы B"/></td></tr></table></p>
                <p><table class="input"><tr><td><label for="VoltageMeterCheck_C" class="labelMeterCheck">Uc[В] = </label>
                    <input id="VoltageMeterCheck_C" type="number" class="inputMeterCheck" name="VoltageMeterCheck_C" placeholder="220" value="220" required min="0" title="напряжение фазы C"/></td></tr></table>
                    <table class="input"><tr><td><label for="CurrentMeterCheck_C" class="labelMeterCheck">Ic[А] = </label>
                        <input id="CurrentMeterCheck_C" type="number" class="inputMeterCheck" name="CurrentMeterCheck_C" placeholder="1" required min="0"  title="ток фазы C"/></td></tr></table></p>
            </div>
            <p><table class="input"><tr><td><label for="ImpsMeterCheck" class="labelMeterCheck">A[имп/кВ*ч] = </label>
                <input id="ImpsMeterCheck" type="number" class="inputMeterCheck" name="ImpsMeterCheck" list="impsList" required min="0" title="постоянная счётчика"/></td></tr></table>
                <datalist id="impsList">
                    <option value="250"></option>
                    <option value="500"></option>
                    <option value="1000"></option>
                    <option value="1600"></option>
                    <option value="3200"></option>
                    <option value="5000"></option>
                    <option value="10000"></option>
            </datalist>
            <table class="input"><tr><td><label for="ImpNumMeterCheck" class="labelMeterCheck">n[имп] = </label>
                <input id="ImpNumMeterCheck" type="number" class="inputMeterCheck" name="ImpNumMeterCheck" required min="0" title="Кол-во последовательных импульсов, которые будут учитываться при расчёте погрешности"/>
                <input id="SMDSerialNumMeterCheck" class="inputErr" name="SMDSerialNumMeterCheck" placeholder="Номер ИПУ"/>
            </td></tr></table></p>
                <p><span id="timer" class="input">00:00:00.0</span></p>
                <p><span id="CalcPower" class="input">Pрасч = 0.0 Вт;   </span>
                    <span id="CalcEnergy" class="input">Wрасч = 0.0 кВт*ч</span></p>
                <div id="resultMeterCheck" style="display: none">
                    <span id="RealMeterPower" class="input"></span>
                        <span id="MeterAccuracy" class="input"></span>
                </div>

        <br>

        <div class="output" id="printBlock"></div>
        <div id="bottomNavbar">
            <button type="submit" id="StartMeterCheck" name="StartMeterCheck">Старт▶</button>
            <button type="reset" id="resetMeterCheck" onclick="clearALL()">↩︎Сброс</button>
        </div>
    </form>
