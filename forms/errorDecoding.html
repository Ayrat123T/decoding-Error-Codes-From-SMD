        <form name="ErrorDecoding">
            <p class="header">Расшифровка кодов ошибок ИПУ</p>
            <p><label for="model" class="input">модель: </label>
                <select id="model" name="model" class="input" type="text">
                    <option value="Iskraemeco" label="Iskraemeco" selected="selected"></option>
                    <option value="mir_C04" label="МИР С-04"></option>
                    <optgroup label="Меркурий">
                        <option value="incotex_204_208_234_238" label="204/208/234/238">
                        <option value="incotex_230" label="230/236">
                    </optgroup>
                    <optgroup label="Энергомера">
                        <option value="energomera_CE_208" label="CE 208">
                        <option value="energomera_CE_303" label="CE 303">>
                        <option value="energomera_CE_308" label="CE 308">
                    </optgroup>
                    <optgroup label="Милур">
                        <option value="milur_107s" label="107s">
                        <option value="milur_307" label="307">
                    </optgroup>
                </select></p>
                <p><div id="VPO" class="inputRadio" style="display: none">
                    <input type = "radio" name= "VPO" value="VPO_6x" label="Iskraemeco" >ВПО 6.x</radio>
                    <input type = "radio" name= "VPO" value="VPO_9_10x">ВПО 9/10.x</radio>
                </div></p>
                    <select id="ErrorTypeSelectCE" class="input" name = 'ErrorTypeSelect' style="display: none">
                        <option value="Err" label="Err" selected="selected">
                        <option value="At" label="At">
                        <option value="Info" label="Info">
                    </select>
                    <label for="errorCode" id = "preErrorCode_Meter_Model" class="input"></label>
                    <input id="errorCode" type="number" class="inputErr" name="errorCode" placeholder="код ошибки" min="0" size="18" required title="введите код ошибки с дисплея ПУ"/></p>
            <br>
                <div id="bottomNavbar">
                    <button id="send" type="submit" name="send" title="Расшифровать код ошибки">🔐Расшифровать</button>
                    <button type="reset" onclick="clearALL()">↩︎Сброс</button>
        </div>
    </form>
