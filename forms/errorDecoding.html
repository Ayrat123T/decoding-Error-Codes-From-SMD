        <main class="page-main">
        <form name="ErrorDecoding">
            <p class="header">Расшифровка кодов ошибок ИПУ</p>
            <p>
                <label for="model" class="input">модель: </label>
                <select id="model" name="model" class="input">
                    <option value="Iskraemeco" selected>Iskraemeco</option>
                    <option value="mir_C04">МИР С-04</option>
                    <optgroup label="Меркурий">
                        <option value="incotex_204_208_234_238">204/208/234/238</option>
                        <option value="incotex_230">230/236</option>
                    </optgroup>
                    <optgroup label="Энергомера">
                        <option value="energomera_CE_208">CE 208</option>
                        <option value="energomera_CE_303">CE 303</option>
                        <option value="energomera_CE_308">CE 308</option>
                    </optgroup>
                    <optgroup label="Милур">
                        <option value="milur_107s">107s</option>
                        <option value="milur_307">307</option>
                    </optgroup>
                </select>
            </p>
            <div id="VPO" class="inputRadio" style="display: none">
                <label><input type="radio" name="VPO" value="VPO_6x"> ВПО 6.x</label>
                <label><input type="radio" name="VPO" value="VPO_9_10x"> ВПО 9/10.x</label>
            </div>
            <p>
                <select id="ErrorTypeSelectCE" class="input" name="ErrorTypeSelect" style="display: none">
                    <option value="Err" selected>Err</option>
                    <option value="At">At</option>
                    <option value="Info">Info</option>
                </select>
            </p>
            <p>
                <label for="errorCode" id="preErrorCode_Meter_Model" class="input"></label>
                <input id="errorCode" type="number" class="inputErr" name="errorCode" placeholder="код ошибки" min="0" size="18" required title="введите код ошибки с дисплея ПУ"/>
            </p>
            <br>
            <div id="bottomNavbar">
                <button id="send" type="submit" name="send" title="Расшифровать код ошибки">🔐Расшифровать</button>
                <button type="reset" onclick="clearALL()">↩︎Сброс</button>
            </div>
        </form>
        <br>
        <template id="result-template">
            <div class="output">
